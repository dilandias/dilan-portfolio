<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilan Dias | SQA Engineer Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #00d2ff; /* Electric Blue */
            --accent-hover: #38bdf8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- Header & Navigation --- */
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 80px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 10px auto;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            text-align: center;
            padding: 10px 0;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            padding: 10px 15px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* --- Layout --- */
        section {
            padding: 80px 20px;
            max-width: 900px;
            margin: auto;
        }

        h2 {
            font-size: 2rem;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            margin-bottom: 30px;
        }
